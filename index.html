<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ID Card Builder (Student/Teacher)</title>

  <style>
    :root{
      --bg:#0b1020;
      --muted:#9fb0d0;
      --text:#eaf0ff;
      --line:rgba(255,255,255,.08);
      --accent-glow: rgba(43,214,123,.20);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 700px at 20% -10%, var(--accent-glow), transparent 55%),
        radial-gradient(1000px 650px at 110% 10%, rgba(76,125,255,.20), transparent 55%),
        var(--bg);
      color:var(--text);
      padding:24px;
    }
    .wrap{
      max-width:1400px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 420px 1fr;
      gap:24px;
    }
    @media (max-width: 1024px){
      .wrap{grid-template-columns:1fr}
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow: 0 20px 50px rgba(0,0,0,.4);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }
    .panel{padding:20px}
    h1{font-size:20px;margin:0 0 8px 0; color: #fff}
    .hint{font-size:12px;color:var(--muted);margin:0 0 20px 0}

    .form{display:grid;gap:12px}
    .field-group{display:grid;gap:5px}
    label{font-size:11px; font-weight: 600; text-transform: uppercase; color:var(--muted); letter-spacing: 0.5px}
    
    input[type="text"], input[type="date"], input[type="number"], select, input[type="color"]{
      width:100%;
      padding:12px;
      background: rgba(0,0,0,.25);
      color:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      outline:none;
      font-size: 14px;
      transition: all 0.2s;
    }
    input[type="color"]{padding:5px; height: 45px; cursor: pointer}
    input:focus, select:focus{
      border-color: #2bd67b;
      background: rgba(0,0,0,.4);
    }

    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .file-input-wrapper{
      display:flex;
      flex-direction: column;
      gap:8px;
      padding:12px;
      background: rgba(255,255,255,.03);
      border:1px dashed rgba(255,255,255,.15);
      border-radius:12px;
    }
    .file-input-wrapper input{ font-size: 11px; color: var(--muted) }

    .btns{display:flex;gap:12px;margin-top:10px}
    button{
      flex: 1;
      padding:14px;
      border-radius:12px;
      border:none;
      font-weight: 700;
      cursor:pointer;
      transition: .3s;
    }
    .btn-download{ background: #2bd67b; color: #050a15 }
    .btn-reset{ background: rgba(255,255,255,.1); color: #fff }
    button:hover{ transform: translateY(-2px); filter: brightness(1.1) }

    .preview-section{
      position: sticky;
      top: 24px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .canvas-container{
      background: rgba(0,0,0,.3);
      padding: 20px;
      border-radius: 24px;
      border: 1px solid var(--line);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas{
      max-width:100%;
      height:auto;
      border-radius:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .status-bar{
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- LEFT: SETTINGS -->
    <div class="card">
      <div class="panel">
        <h1>ID Card Configurator</h1>
        <p class="hint">Amboary ny mombamomba ny sekoly sy ny olona ato.</p>

        <div class="form">
          <div class="field-group">
            <label>Sekoly (School Name)</label>
            <input id="schoolName" type="text" value="University of Alaska" placeholder="Anaran'ny sekoly..." />
          </div>

          <div class="field-group">
            <label>Anarana feno (Full Name)</label>
            <input id="fullName" type="text" value="Levelo Nior" placeholder="Anarana sy fanampiny..." />
          </div>

          <div class="row">
            <div class="field-group">
              <label>ID / UID Number</label>
              <input id="uid" type="text" value="569752" />
            </div>
            <div class="field-group">
              <label>Role</label>
              <select id="role">
                <option value="STUDENT">STUDENT</option>
                <option value="TEACHER">TEACHER</option>
                <option value="STAFF">STAFF</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="field-group">
              <label>Date of Birth</label>
              <input id="dob" type="date" value="2005-09-25" />
            </div>
            <div class="field-group">
              <label>Valid Thru (Year)</label>
              <input id="validThru" type="number" value="2030" />
            </div>
          </div>

          <div class="row">
            <div class="field-group">
              <label>Faculty</label>
              <select id="faculty">
                <option>Faculty of Science</option>
                <option>Faculty of Engineering</option>
                <option>Faculty of Arts</option>
                <option>Faculty of Business</option>
                <option>Faculty of Medicine</option>
              </select>
            </div>
            <div class="field-group">
              <label>Department</label>
              <select id="department">
                <option>Department of Physics</option>
                <option>Department of Mathematics</option>
                <option>Department of Chemistry</option>
                <option>Department of Biology</option>
                <option>Department of Computer Science</option>
              </select>
            </div>
          </div>

          <div class="field-group">
            <label>Banner Text (Programme/Major)</label>
            <input id="bannerText" type="text" value="PHYSICS AND SCIENCE" />
          </div>

          <div class="row">
            <div class="field-group">
              <label>School Name Color</label>
              <input id="schoolColor" type="color" value="#2a7bcf" />
            </div>
            <div class="field-group">
              <label>Banner Color</label>
              <input id="bannerBg" type="color" value="#1f9d66" />
            </div>
          </div>

          <div class="row">
            <div class="field-group">
              <label>Accent Color (Details)</label>
              <select id="accentColor">
                <option value="#2a7bcf">Blue Ocean</option>
                <option value="#1f9d66">Forest Green</option>
                <option value="#7c3aed">Royal Purple</option>
                <option value="#ef4444">Electric Red</option>
                <option value="#111827">Midnight Black</option>
              </select>
            </div>
            <div class="field-group">
              <label>Issued Year</label>
              <input id="issuedYear" type="number" value="2026" />
            </div>
          </div>

          <div class="row">
            <div class="field-group">
              <label>Learning Mode</label>
              <select id="learningMode">
                <option>Virtual Learning</option>
                <option>On-Campus</option>
                <option>Hybrid</option>
              </select>
            </div>
            <div class="file-input-wrapper">
                <label>Signature (Sonia)</label>
                <input id="sigFile" type="file" accept="image/*" />
            </div>
          </div>

          <div class="row">
             <div class="file-input-wrapper">
                <label>Sary (Photo)</label>
                <input id="photoFile" type="file" accept="image/*" />
              </div>
              <div class="file-input-wrapper">
                <label>Logo an'ny Sekoly</label>
                <input id="logoFile" type="file" accept="image/*" />
              </div>
          </div>

          <div class="btns">
            <button class="btn-download" id="downloadBtn">DOWNLOAD PNG</button>
            <button class="btn-reset" id="resetBtn">RESET</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: LIVE PREVIEW -->
    <div class="preview-section">
      <div class="status-bar">
        <span>LIVE PREVIEW</span>
        <span>1000 x 620 PX</span>
      </div>
      <div class="canvas-container">
        <canvas id="cardCanvas" width="1000" height="620"></canvas>
      </div>
      <div class="status-bar">
        <span>Ny fanovana dia mihatra avy hatrany.</span>
        <span>Export amin'ny alalan'ny bokotra maitso.</span>
      </div>
    </div>

  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Dom Elements
    const schoolNameEl = $("schoolName");
    const fullNameEl = $("fullName");
    const uidEl = $("uid");
    const roleEl = $("role");
    const dobEl = $("dob");
    const validThruEl = $("validThru");
    const facultyEl = $("faculty");
    const departmentEl = $("department");
    const bannerTextEl = $("bannerText");
    const accentColorEl = $("accentColor");
    const schoolColorEl = $("schoolColor");
    const bannerBgEl = $("bannerBg");
    const issuedYearEl = $("issuedYear");
    const learningModeEl = $("learningMode");
    const photoFileEl = $("photoFile");
    const logoFileEl = $("logoFile");
    const sigFileEl = $("sigFile");
    const canvas = $("cardCanvas");
    const ctx = canvas.getContext("2d");

    let userImg = null;
    let schoolLogo = null;
    let signatureImg = null;

    // Helper functions
    function formatDate(val) {
      if(!val) return "";
      const d = new Date(val);
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    async function processImage(file) {
      if(!file) return null;
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function drawCard() {
      const data = {
        school: schoolNameEl.value,
        name: fullNameEl.value,
        uid: uidEl.value,
        role: roleEl.value,
        dob: formatDate(dobEl.value),
        valid: validThruEl.value,
        faculty: facultyEl.value,
        dept: departmentEl.value,
        banner: bannerTextEl.value.toUpperCase(),
        accent: accentColorEl.value,
        schoolColor: schoolColorEl.value,
        bannerBg: bannerBgEl.value,
        issued: issuedYearEl.value,
        mode: learningModeEl.value
      };

      // 1. Clean Canvas
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 2. Main Border Effect
      ctx.strokeStyle = "rgba(0,0,0,0.06)";
      ctx.lineWidth = 15;
      ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);

      // 3. School Branding Area
      const logoSize = 250;
      if(schoolLogo) {
        ctx.drawImage(schoolLogo, 45, 30, logoSize, logoSize);
      } else {
        ctx.fillStyle = data.accent;
        ctx.font = "900 130px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("UAF", 45, 160);
      }

      // SCHOOL NAME (DYNAMIC COLOR & CASE)
      ctx.fillStyle = data.schoolColor;
      ctx.textAlign = "left";
      ctx.font = "900 26px sans-serif";
      ctx.fillText(data.school, 310, 110);
      
      ctx.font = "700 16px sans-serif";
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillText("OFFICIAL ACADEMIC CREDENTIALS", 310, 140);

      // 4. Photo Area
      const px = 700, py = 45, pw = 250, ph = 250;
      ctx.fillStyle = "#f3f4f6";
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 24);
      ctx.fill();
      
      ctx.save();
      ctx.clip();
      if(userImg) {
        ctx.drawImage(userImg, px, py, pw, ph);
      } else {
        ctx.fillStyle = "#cbd5e1";
        ctx.beginPath(); ctx.arc(px+pw/2, py+ph/2-20, 45, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(px+pw/2, py+ph/2+65, 80, 50, 0, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
      
      ctx.strokeStyle = "rgba(0,0,0,0.08)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // 5. Personal Details (Left Side)
      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.font = "700 20px sans-serif";
      ctx.fillText(data.faculty, 65, 275);
      ctx.fillText(data.dept, 65, 305);

      // FULL NAME (DYNAMIC CASE & GRAS BE)
      ctx.fillStyle = "#000";
      ctx.font = "900 58px sans-serif";
      ctx.fillText(data.name, 65, 370);

      // UID & ROLE (GRAS)
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.font = "800 32px sans-serif";
      ctx.fillText(`${data.uid} | ${data.role}`, 65, 420);

      // SIGNATURE (Sonia)
      const sigX = 65, sigY = 430, sigW = 280, sigH = 80;
      if(signatureImg) {
        ctx.drawImage(signatureImg, sigX, sigY, sigW, sigH);
      }
      ctx.strokeStyle = "rgba(0,0,0,0.15)";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sigX, sigY + sigH - 5); ctx.lineTo(sigX + sigW, sigY + sigH - 5); ctx.stroke();
      ctx.font = "italic 14px sans-serif";
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillText("Authorized Signature", sigX, sigY + sigH + 15);

      // 6. Metadata (Right Side)
      const rx = 700;
      const metaYStart = 315;
      const metaGap = 45;

      const drawMeta = (label, val, y) => {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.font = "700 15px sans-serif";
        ctx.fillText(label.toUpperCase(), rx, y);
        ctx.fillStyle = "#000";
        ctx.font = "900 26px sans-serif";
        ctx.fillText(val, rx, y + 26);
      };

      drawMeta("Date of Birth", data.dob, metaYStart);
      drawMeta("Valid Thru", data.valid, metaYStart + metaGap * 1.6);
      drawMeta("Issued", data.issued, metaYStart + metaGap * 3.2);
      
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.font = "700 20px sans-serif";
      ctx.fillText(data.mode, rx, 515);

      // 7. Banner Band (Bottom)
      const bx = 20, by = 535, bw = canvas.width - 40, bh = 70;
      ctx.fillStyle = data.bannerBg;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 14);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "900 36px sans-serif";
      ctx.fillText(data.banner, canvas.width/2, by + bh/2 + 15);
    }

    // Event Listeners for Live Update
    const inputs = [schoolNameEl, fullNameEl, uidEl, roleEl, dobEl, validThruEl, facultyEl, departmentEl, bannerTextEl, accentColorEl, schoolColorEl, bannerBgEl, issuedYearEl, learningModeEl];
    inputs.forEach(el => el.addEventListener("input", drawCard));

    photoFileEl.onchange = async () => { userImg = await processImage(photoFileEl.files[0]); drawCard(); };
    logoFileEl.onchange = async () => { schoolLogo = await processImage(logoFileEl.files[0]); drawCard(); };
    sigFileEl.onchange = async () => { signatureImg = await processImage(sigFileEl.files[0]); drawCard(); };

    // Buttons
    $("downloadBtn").onclick = () => {
      const link = document.createElement('a');
      link.download = `ID_${fullNameEl.value.replace(/\s+/g, '_')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    };

    $("resetBtn").onclick = () => {
      if(confirm("Te hamerina ny zava-drehetra amin'ny default ve ianao?")) {
        location.reload();
      }
    };

    window.onload = drawCard;
  </script>
</body>
</html>
