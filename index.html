<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional ID Card Builder v2.3</title>

  <style>
    :root{
      --bg:#0f172a;
      --muted:#94a3b8;
      --text:#f1f5f9;
      --line:rgba(255,255,255,.1);
      --accent:#2bd67b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color:var(--text);
      padding:24px;
    }
    .wrap{
      max-width:1400px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 450px 1fr;
      gap:30px;
    }
    @media (max-width: 1100px){
      .wrap{grid-template-columns:1fr}
    }
    .card-config{
      background: #1e293b;
      border:1px solid var(--line);
      border-radius:20px;
      padding:24px;
      box-shadow: 0 10px 25px rgba(0,0,0,.3);
      max-height: 95vh;
      overflow-y: auto;
    }
    h1{font-size:22px;margin:0 0 5px 0; color: #fff}
    .hint{font-size:13px;color:var(--muted);margin:0 0 25px 0}

    .form-grid{display:grid;gap:15px}
    .field{display:grid;gap:6px}
    label{font-size:11px; font-weight: 700; text-transform: uppercase; color:var(--muted); letter-spacing: 0.05em}
    
    input, select{
      width:100%;
      padding:12px;
      background: rgba(15, 23, 42, 0.6);
      color:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      outline:none;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus, select:focus{ border-color: var(--accent) }

    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
    .file-box{
      background: rgba(255,255,255,0.02);
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px;
    }
    .file-box input{ font-size: 11px; border:none; padding: 5px }

    .btns{display:flex;gap:12px;margin-top:20px; padding-bottom: 20px;}
    button{
      flex: 1;
      padding:15px;
      border-radius:12px;
      border:none;
      font-weight: 700;
      cursor:pointer;
      transition: 0.2s;
    }
    .btn-save{ background: var(--accent); color: #0f172a }
    .btn-reset{ background: rgba(255,255,255,.05); color: #fff }
    button:hover{ transform: translateY(-2px); opacity: 0.9 }

    .preview-area{
      position: sticky;
      top: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .canvas-box{
      background: #000;
      padding: 40px;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
    }
    canvas{
      max-width:100%;
      height:auto;
      border-radius:18px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .info-bar{
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .info-bar b { color: var(--accent); }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- SETTINGS -->
    <div class="card-config">
      <h1>ID Card Configurator</h1>
      <p class="hint">Amboary ny fepetra rehetra ahatonga ny karatra ho validé.</p>

      <div class="form-grid">
        <div class="field">
          <label>Anaran'ny Sekoly</label>
          <input id="schoolName" type="text" value="Park University" />
        </div>

        <div class="field">
          <label>Adiresy</label>
          <input id="schoolAddress" type="text" value="8700 NW River Park Dr, Parkville, MO 64152" />
        </div>

        <div class="field">
          <label>Academic Year</label>
          <input id="academicYear" type="text" value="Academic Year 2025 - 2026" />
        </div>

        <div class="field">
          <label>Anarana feno</label>
          <input id="fullName" type="text" value="Rakoto Landry" />
        </div>

        <div class="row-2">
          <div class="field">
            <label>ID Number</label>
            <input id="uid" type="text" value="576924" />
          </div>
          <div class="field">
            <label>Status/Role</label>
            <select id="role">
              <option value="STUDENT">STUDENT</option>
              <option value="TEACHER">TEACHER</option>
              <option value="STAFF">STAFF</option>
              <option value="GRADUATE">GRADUATE</option>
            </select>
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label>Faculty</label>
            <select id="faculty">
              <option>Faculty of Science</option>
              <option>Faculty of Engineering</option>
              <option>Faculty of Arts & Humanities</option>
              <option>Faculty of Business</option>
              <option>Faculty of Medicine</option>
              <option>Faculty of Information Technology</option>
            </select>
          </div>
          <div class="field">
            <label>Department</label>
            <input id="department" type="text" value="Department of Physics" />
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label>Birth Date</label>
            <input id="dob" type="date" value="2008-06-26" />
          </div>
          <div class="field">
            <label>Valid Thru</label>
            <input id="validThru" type="text" value="2030" />
          </div>
        </div>

        <div class="row-2">
           <div class="field">
            <label>Issued Date</label>
            <input id="issued" type="text" value="2026" />
          </div>
          <div class="field">
            <label>Learning Mode</label>
            <select id="mode">
              <option value="Virtual Learning">Virtual Learning</option>
              <option value="On-Campus">On-Campus</option>
              <option value="Hybrid">Hybrid</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Banner Text (Major)</label>
          <input id="bannerText" type="text" value="PHYSICS AND SCIENCE" />
        </div>

        <div class="field">
          <label>Signature (Sonia)</label>
          <div class="file-box">
            <input id="sigFile" type="file" accept="image/*" />
          </div>
        </div>

        <div class="row-2">
          <div class="file-box">
            <label>User Photo</label>
            <input id="photoFile" type="file" accept="image/*" />
          </div>
          <div class="file-box">
            <label>School Logo</label>
            <input id="logoFile" type="file" accept="image/*" />
          </div>
        </div>

        <div class="btns">
          <button class="btn-save" id="downloadBtn">DOWNLOAD PNG</button>
          <button class="btn-reset" id="resetBtn">RESET</button>
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-area">
      <div class="info-bar">
        <b>Dika vaovao v2.3:</b> Nampiana "Security Pattern" any aoriana sy fanitsiana ny toerana misy ny sonia.
      </div>
      <div class="canvas-box">
        <canvas id="cardCanvas" width="1000" height="620"></canvas>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const canvas = $("cardCanvas");
    const ctx = canvas.getContext("2d");

    let userImg = null;
    let schoolLogo = null;
    let signatureImg = null;

    function formatDate(val) {
      if(!val) return "";
      const d = new Date(val);
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    async function processImage(file) {
      if(!file) return null;
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // Pattern background for security feel
    function drawSecurityPattern() {
        ctx.save();
        ctx.globalAlpha = 0.03;
        ctx.fillStyle = "#000";
        ctx.font = "bold 10px sans-serif";
        for (let y = 0; y < canvas.height; y += 40) {
            for (let x = 0; x < canvas.width; x += 150) {
                ctx.fillText("OFFICIAL ID • VERIFIED • ", x, y);
            }
        }
        ctx.restore();
    }

    function drawBarcode(x, y, w, h) {
      ctx.fillStyle = "#000";
      let currentX = 0;
      while (currentX < w) {
        let barW = Math.random() * 3 + 1;
        if (currentX + barW > w) barW = w - currentX;
        ctx.fillRect(x + currentX, y, barW, h);
        currentX += barW + (Math.random() * 2 + 2);
      }
    }

    function drawQR(x, y, size) {
        const modules = 25; 
        const modSize = size / modules;
        ctx.fillStyle = "#fff";
        ctx.fillRect(x, y, size, size);
        ctx.fillStyle = "#000";

        function drawFinder(fx, fy) {
            ctx.fillStyle = "#000";
            ctx.fillRect(fx, fy, modSize * 7, modSize * 7);
            ctx.fillStyle = "#fff";
            ctx.fillRect(fx + modSize, fy + modSize, modSize * 5, modSize * 5);
            ctx.fillStyle = "#000";
            ctx.fillRect(fx + modSize * 2, fy + modSize * 2, modSize * 3, modSize * 3);
        }

        drawFinder(x, y); 
        drawFinder(x + size - modSize * 7, y); 
        drawFinder(x, y + size - modSize * 7); 

        for (let r = 0; r < modules; r++) {
            for (let c = 0; c < modules; c++) {
                if ((r < 8 && c < 8) || (r < 8 && c > modules - 9) || (r > modules - 9 && c < 8)) continue;
                if (Math.random() > 0.5) {
                    ctx.fillRect(x + c * modSize, y + r * modSize, modSize, modSize);
                }
            }
        }
    }

    function drawStamp(x, y, schoolName) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(-0.1);
        ctx.strokeStyle = "rgba(30, 64, 175, 0.4)";
        ctx.lineWidth = 3;
        ctx.strokeRect(0, 0, 220, 80);
        ctx.fillStyle = "rgba(30, 64, 175, 0.4)";
        ctx.textAlign = "center";
        ctx.font = "bold 13px sans-serif";
        ctx.fillText("VERIFIED BY REGISTRAR", 110, 25);
        ctx.font = "bold 20px sans-serif";
        ctx.fillText("APPROVED", 110, 50);
        ctx.font = "bold 11px sans-serif";
        ctx.fillText(schoolName.toUpperCase(), 110, 68);
        ctx.restore();
    }

    function drawCard() {
      const d = {
        school: $("schoolName").value,
        address: $("schoolAddress").value,
        academicYear: $("academicYear").value,
        name: $("fullName").value,
        uid: $("uid").value,
        role: $("role").value,
        dob: formatDate($("dob").value),
        valid: $("validThru").value,
        issued: $("issued").value,
        faculty: $("faculty").value,
        dept: $("department").value,
        banner: $("bannerText").value.toUpperCase(),
        mode: $("mode").value
      };

      // 1. Clean Canvas
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 2. Security Background
      drawSecurityPattern();

      // Card border
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      ctx.strokeRect(4, 4, canvas.width-8, canvas.height-8);

      // 3. Header
      if(schoolLogo) {
        ctx.drawImage(schoolLogo, 50, 40, 210, 210);
      } else {
        ctx.fillStyle = "#991b1b";
        ctx.fillRect(50, 40, 210, 210);
      }

      ctx.textAlign = "left";
      ctx.fillStyle = "#991b1b";
      ctx.font = "bold 34px sans-serif";
      ctx.fillText(d.school, 290, 85);

      ctx.fillStyle = "#64748b";
      ctx.font = "bold 16px sans-serif";
      ctx.fillText("OFFICIAL ACADEMIC CREDENTIALS", 290, 115);

      ctx.font = "500 14px sans-serif";
      ctx.fillText(d.address, 290, 140);

      // Academic Year (Key)
      ctx.fillStyle = "#1e40af";
      ctx.font = "bold 20px sans-serif";
      ctx.fillText(d.academicYear, 290, 175);

      // 4. Photo
      const px = 710, py = 45, pw = 250, ph = 280;
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 15);
      ctx.clip();
      ctx.fillStyle = "#f8fafc";
      ctx.fillRect(px, py, pw, ph);
      if(userImg) {
        ctx.drawImage(userImg, px, py, pw, ph);
      }
      ctx.restore();
      ctx.strokeStyle = "#cbd5e1";
      ctx.stroke();

      // 5. Details Section
      ctx.fillStyle = "#475569";
      ctx.font = "bold 20px sans-serif";
      ctx.fillText(d.faculty, 60, 290);
      ctx.font = "500 18px sans-serif";
      ctx.fillText(d.dept, 60, 320);

      ctx.fillStyle = "#000000";
      ctx.font = "bold 64px sans-serif";
      ctx.fillText(d.name, 60, 395);

      ctx.fillStyle = "#1e40af";
      ctx.font = "800 36px sans-serif";
      ctx.fillText(`${d.uid} | ${d.role}`, 60, 445);

      // Signature (Adjusted Position)
      const sigX = 60, sigY = 460, sigW = 280, sigH = 70;
      if(signatureImg) {
        ctx.drawImage(signatureImg, sigX, sigY - 10, sigW, sigH);
      }
      ctx.strokeStyle = "#94a3b8";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sigX, sigY + sigH - 15); ctx.lineTo(sigX + sigW, sigY + sigH - 15); ctx.stroke();
      
      ctx.font = "italic 16px sans-serif";
      ctx.fillStyle = "#64748b";
      // This is the label moved up slightly to be visible
      ctx.fillText("Authorized Registrar Signature", sigX, sigY + sigH + 5);

      // 6. Meta Data
      const mx = 710;
      const drawInfo = (label, val, y) => {
        ctx.fillStyle = "#64748b";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(label.toUpperCase(), mx, y);
        ctx.fillStyle = "#000";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText(val, mx, y + 32);
      };

      drawInfo("Date of Birth", d.dob, 355);
      drawInfo("Valid Thru", d.valid, 435);
      drawInfo("Issued Date", d.issued, 515);

      ctx.fillStyle = "#64748b";
      ctx.font = "bold 18px sans-serif";
      ctx.fillText(d.mode, mx, 575);

      // 7. Security Features
      drawBarcode(60, 560, 250, 45);
      drawQR(400, 420, 110);
      drawStamp(410, 245, d.school);

      // 8. Bottom Banner
      const bx = 20, by = 545, bw = 650, bh = 65;
      ctx.fillStyle = "#991b1b";
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 10);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "bold 36px sans-serif";
      ctx.fillText(d.banner, bx + bw/2, by + bh/2 + 12);
    }

    const allInputs = document.querySelectorAll('input, select');
    allInputs.forEach(i => i.addEventListener('input', drawCard));

    $("photoFile").onchange = async (e) => { userImg = await processImage(e.target.files[0]); drawCard(); };
    $("logoFile").onchange = async (e) => { schoolLogo = await processImage(e.target.files[0]); drawCard(); };
    $("sigFile").onchange = async (e) => { signatureImg = await processImage(e.target.files[0]); drawCard(); };

    $("downloadBtn").onclick = () => {
      const link = document.createElement('a');
      link.download = `Student_ID_Official.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    };

    $("resetBtn").onclick = () => location.reload();

    window.onload = drawCard;
  </script>
</body>
</html>
